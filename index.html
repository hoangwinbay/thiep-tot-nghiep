<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink-bg: #fff0f3;
            --pink-light: #ffccd5;
            --accent: #c2185b;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        /* 1. Reset: Bỏ height cố định để ảnh có thể lặp lại theo nội dung */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
        }

        body {
    font-family: 'Quicksand', sans-serif;
    color: #333;
    overflow-x: hidden;
    display: block;

    /* 1. Đường dẫn ảnh của bạn */
    background-image: url('nen-cua-toi.jpg') !important;

    /* 2. CHÌA KHÓA: 100vw đảm bảo chiều ngang luôn bằng đúng chiều rộng màn hình thiết bị */
    /* auto giúp chiều cao tự nhảy theo tỉ lệ ảnh để không bị méo */
    background-size: 100vw auto !important;

    /* 3. Lặp lại theo chiều dọc cho đến hết trang */
    background-repeat: repeat-y !important;

    /* 4. Để ảnh trôi theo khi cuộn trang (quan trọng để lặp lại được) */
    background-attachment: scroll !important;

    /* 5. Căn giữa để nếu ảnh có chi tiết quan trọng thì nó luôn nằm giữa màn hình */
    background-position: top center;
    
    background-color: var(--pink-bg);
}
@media screen and (max-width: 768px) {
    body {
        /* Không cần quy định lại background-size ở đây */
    }
/* XÓA BỎ đoạn @media screen bên dưới nếu nó có background-size: cover */
/* Vì cover sẽ ghi đè và làm mất tính năng lặp lại */

        /* 2. Xóa các mảng màu che mất ảnh nền */
        .section-intro, .section-wishes { 
            background: transparent !important; 
        }

        /* Music Button */
        #music-btn {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px; background: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 10001; cursor: pointer;
        }
        .rotating { animation: rotateMusic 4s linear infinite; }
        @keyframes rotateMusic { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Intro Section */
        .section-intro { 
            min-height: 100vh;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .name { font-family: 'Dancing Script', cursive; font-size: 50px; color: var(--accent); margin: 10px 0; }
        .hero-photo {
            width: 160px; height: 160px;
            border-radius: 50%; object-fit: cover;
            border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: 15px 0;
        }

        .countdown-container {
            display: flex; gap: 12px; margin-top: 20px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 15px; border-radius: 25px;
        }
        .countdown-time { font-size: 22px; font-weight: 700; color: var(--accent); }

        /* Gallery */
        .gallery-container { padding: 40px 15px; max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 100px; }
        .photo-block { display: flex; flex-direction: column; width: 100%; position: relative; }
        .photo-frame { width: 85%; max-width: 400px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .photo-frame img { width: 100%; height: auto; border-radius: 12px; }
        .meaning-box { 
            width: 95%; background: var(--white-glass); padding: 20px; border-radius: 20px; 
            margin-top: -40px; z-index: 2; border-left: 6px solid var(--accent); 
            box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .photo-block:nth-child(even) .photo-frame { align-self: flex-end; }
        .photo-block:nth-child(even) .meaning-box { align-self: flex-start; border-left: 0; border-right: 6px solid var(--accent); }

        /* Info Card */
        .section-info-detail {
            max-width: 90%; margin: 40px auto; background: white; padding: 25px;
            border-radius: 25px; text-align: center; border: 2px dashed var(--accent);
        }

        /* 3. LƯU BÚT (Đảm bảo hiện rõ) */
        .section-wishes { 
            padding: 40px 15px 150px 15px; 
            width: 100%; box-sizing: border-box;
            display: block !important;
        }
        .wish-list-title { text-align: center; font-family: 'Dancing Script', cursive; font-size: 35px; color: var(--accent); margin-bottom: 25px; }
        #static-wish-list { display: flex; flex-direction: column; gap: 15px; max-width: 550px; margin: 0 auto; }
        .wish-card { 
            background: rgba(255, 255, 255, 0.9) !important; 
            padding: 15px; border-radius: 12px; 
            border-left: 5px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Input Cố định */
        .input-sticky { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: white; padding: 10px 15px; 
            border-radius: 50px; display: flex; align-items: center; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 10000; 
        }
        .input-sticky input { border: none; outline: none; flex: 1; padding: 5px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        #wish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .floating-bubble {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; background: white;
            padding: 15px; border-radius: 15px; border-top: 5px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: flowUpOnce 10s linear forwards; opacity: 0;
        }
        @keyframes flowUpOnce { 0% { bottom: -120px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { bottom: 95vh; opacity: 0; } }

        
</head>
<body>

    <div id="music-btn" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <audio id="bg-audio" loop>
            <source src="nhac-nen.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="section-intro">
        <div data-aos="zoom-in" style="font-size: 50px;">✨</div>
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name" data-aos="fade-down">Trần Đoàn Yến Nhi</div>
        <img src="anh4.jpg" alt="Yến Nhi" class="hero-photo" data-aos="zoom-in">
        
        <div class="countdown-container" data-aos="fade-up">
            <div class="countdown-item"><div class="countdown-time" id="days">00</div>Ngày</div>
            <div class="countdown-item"><div class="countdown-time" id="hours">00</div>Giờ</div>
            <div class="countdown-item"><div class="countdown-time" id="minutes">00</div>Phút</div>
            <div class="countdown-item"><div class="countdown-time" id="seconds">00</div>Giây</div>
        </div>
    </div>

    <div id="wish-overlay"></div>

     <div class="gallery-container">

        <div class="photo-block" data-aos="fade-up">

            <div class="photo-frame"><img src="anh1.jpg"></div>

            <div class="meaning-box">

                <h3>Tự do & tỏa sáng</h3>

                <p>Yêu thương bản thân và luôn giữ nụ cười trên môi, vì mỗi ngày đi qua đều là một món quà của tuổi trẻ. Hãy cứ là chính mình: rạng rỡ, tự tin và đầy hy vọng vào tương lai phía trước. Đừng ngại tỏa sáng theo cách của riêng bạn!</p>

            </div>

        </div>

        <div class="photo-block" data-aos="fade-up">

            <div class="photo-frame"><img src="anh2.jpg"></div>

            <div class="meaning-box">

                <h3>Mảnh ghép thanh xuân</h3>

                <p>Tốt nghiệp không phải là kết thúc, mà là mở ra những lối đi riêng nhưng ký ức về tập thể này sẽ mãi luôn ở đó. Cảm ơn những người bạn đã cùng mình đi qua những kỳ thi căng thẳng, cùng chia sẻ những tiếng cười dưới mái trường này. Chúng ta là một phần thanh xuân của nhau.</p>

            </div>

        </div>

        <div class="photo-block" data-aos="fade-up">

            <div class="photo-frame"><img src="anh3.jpg"></div>

            <div class="meaning-box">

                <h3>Gói ghem kỷ niệm</h3>

                <p>Bộ đồng phục này có lẽ từ mai bạn sẽ không còn mặc nữa, nhưng những bài học và tình thầy trò sẽ theo bạn mãi về sau. Gói ghém tất cả sự ngây ngô và chân thành vào màu áo trắng, hãy sẵn sàng bước tiếp chương tiếp theo của cuộc đời với sự tự tin và lòng trắc ẩn.</p>

            </div>

        </div>

        <div class="photo-block" data-aos="fade-up">

            <div class="photo-frame"><img src="anh5.jpg"></div>

            <div class="meaning-box">

                <h3>Bản lĩnh & nhiệt huyết</h3>

                <p>Màu áo xanh gắn liền với những ngày nắng gió trên thao trường, nơi bạn học được cách kiên cường và trân trọng những giá trị giản đơn. Hãy mang theo tinh thần chiến binh ấy vào đời, để vượt qua mọi thử thách và biến ước mơ thành hiện thực.</p>

            </div>

        </div>

        <div class="photo-block" data-aos="fade-up">

            <div class="photo-frame"><img src="anh6.jpg"></div>

            <div class="meaning-box">

                <h3>Nơi giấc mơ bắt đầu</h3>

                <p>Cảm ơn phiên bản nhỏ bé năm ấy đã luôn chăm chỉ và không ngừng mơ ước. Hành trình vạn dặm bắt đầu từ những bước chân đầu tiên này. Hãy luôn giữ vững niềm tin thơ ngây ấy, vì chính nó sẽ dẫn lối bạn đến những đỉnh cao mới.</p>

            </div>

        </div>

    </div>



    <div class="section-info-detail" data-aos="zoom-in">
        <div class="info-title">Thông Tin Buổi Lễ</div>
        <div>📅 Ngày: 26/04/2026 | 📍 Địa điểm: Trường THPT Nguyễn Trường Thúy</div>
    </div>

    <div class="section-wishes">
        <div class="wish-list-title">Dòng Lưu Bút</div>
        <div id="static-wish-list"></div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init({ duration: 1200, once: true });

        // Firebase Config (Giữ nguyên của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Nhạc
        const audio = document.getElementById('bg-audio');
        const mBtn = document.getElementById('music-btn');
        function toggleMusic() {
            if (audio.paused) { audio.play(); mBtn.classList.add('rotating'); }
            else { audio.pause(); mBtn.classList.remove('rotating'); }
        }

        // Firebase Wishes
        db.ref('wishes').on('value', (snapshot) => {
            const listContainer = document.getElementById('static-wish-list');
            listContainer.innerHTML = ''; 
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
                    listContainer.prepend(card); 
                });
            }
        });

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 150, origin: { y: 0.8 } });
                document.getElementById('name-in').value = '';
                document.getElementById('msg-in').value = '';
            }
        }

        function updateCountdown() {
            const target = new Date("April 26, 2026 10:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) return;
            document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
