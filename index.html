<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --accent: #c2185b; 
            --pink-light: #fce4ec; 
            --pink-bg: #ffe0e9; 
            --white-glass: rgba(255, 255, 255, 0.92);
        }

        body { 
            margin: 0; 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--pink-light); 
            background-image: linear-gradient(135deg, #fffafa 0%, #fde2e4 100%);
            color: #333; 
            overflow-x: hidden; 
        }

        /* Music Button */
        #music-btn {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px; background: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 10001;
            cursor: pointer; font-size: 20px; transition: all 0.3s ease;
        }
        .rotating { animation: rotateMusic 4s linear infinite; }
        @keyframes rotateMusic { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Sections */
        .section-intro { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light));
        }
        .name { font-family: 'Dancing Script', cursive; font-size: 50px; color: var(--accent); margin: 10px 0; }
        .hero-photo { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin: 15px 0; }

        .countdown-container { display: flex; gap: 12px; margin-top: 20px; background: rgba(255, 255, 255, 0.5); padding: 10px 15px; border-radius: 25px; }
        .countdown-time { font-size: 22px; font-weight: 700; color: var(--accent); }
        .countdown-label { font-size: 10px; text-transform: uppercase; color: #777; }

        .gallery-container { padding: 80px 15px; max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 140px; }
        .photo-block { display: flex; flex-direction: column; width: 100%; position: relative; }
        .photo-frame { width: 85%; max-width: 400px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); }
        .photo-frame img { width: 100%; height: 480px; object-fit: cover; border-radius: 12px; }
        .meaning-box { width: 95%; background: var(--white-glass); padding: 25px; border-radius: 25px; margin-top: -60px; z-index: 2; border-left: 8px solid var(--accent); box-sizing: border-box; }
        
        /* Floating Messages Logic */
        #wish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .floating-bubble {
            position: absolute;
            width: 75%; max-width: 280px; background: white;
            padding: 15px; border-radius: 18px; border-top: 4px solid var(--accent);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); font-size: 13px;
            animation: flowUpOnce 12s linear forwards; /* Tăng thời gian để trôi mượt hơn */
            opacity: 0;
        }
        @keyframes flowUpOnce { 
            0% { bottom: -150px; opacity: 0; transform: translateX(0); } 
            10% { opacity: 1; } 
            90% { opacity: 1; } 
            100% { bottom: 105vh; opacity: 0; transform: translateX(10px); } 
        }

        .section-wishes { background: white; padding: 60px 20px 180px 20px; border-radius: 50px 50px 0 0; }
        #static-wish-list { display: flex; flex-direction: column; gap: 20px; max-width: 550px; margin: 0 auto; }
        .wish-card { background: var(--pink-light); padding: 18px; border-radius: 15px; border-left: 5px solid var(--accent); }

        .input-sticky { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: white; padding: 12px 18px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.25); z-index: 10000; }
        .input-sticky input { border: none; outline: none; flex: 1; font-size: 15px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="music-btn" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <audio id="bg-audio" loop>
            <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="section-intro">
        <div data-aos="zoom-in" style="font-size: 60px;">✨</div>
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <img src="anh_hero.jpg" class="hero-photo" data-aos="zoom-in">
        <div class="countdown-container">
            <div class="countdown-item"><div class="countdown-time" id="days">00</div><div class="countdown-label">Ngày</div></div>
            <div class="countdown-item"><div class="countdown-time" id="hours">00</div><div class="countdown-label">Giờ</div></div>
            <div class="countdown-item"><div class="countdown-time" id="minutes">00</div><div class="countdown-label">Phút</div></div>
            <div class="countdown-item"><div class="countdown-time" id="seconds">00</div><div class="countdown-label">Giây</div></div>
        </div>
    </div>

    <div id="wish-overlay"></div>

    <div class="gallery-container">
        <div class="photo-block" data-aos="fade-up">
            <div class="photo-frame"><img src="anh1.jpg"></div>
            <div class="meaning-box">
                <h3>Khúc dạo đầu của ước mơ</h3>
                <p>Mỗi hành trình vạn dặm đều bắt đầu từ một bước chân nhỏ bé...</p>
            </div>
        </div>
    </div>

    <div class="section-wishes">
        <div style="text-align:center; font-family:'Dancing Script'; font-size:40px; color:var(--accent); margin-bottom:30px;">Dòng Lưu Bút</div>
        <div id="static-wish-list"></div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc đến Nhi...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init({ duration: 1200, once: true });

        // Firebase & Music (Giữ nguyên)
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const audio = document.getElementById('bg-audio');
        const mBtn = document.getElementById('music-btn');
        function toggleMusic() {
            if (audio.paused) { audio.play(); mBtn.classList.add('rotating'); }
            else { audio.pause(); mBtn.classList.remove('rotating'); }
        }

        // --- HỆ THỐNG TRÔI TIN NHẮN KHÔNG CHỒNG LẤP ---
        let wishesArr = [];
        let shownIndices = new Set();
        let lastLane = -1; // Lưu làn đường vừa dùng

        db.ref('wishes').on('value', (snapshot) => {
            const listContainer = document.getElementById('static-wish-list');
            listContainer.innerHTML = ''; 
            wishesArr = [];
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    wishesArr.push(data);
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
                    listContainer.prepend(card); 
                });
            }
        });

        function spawnWishBubble(index) {
            if (shownIndices.has(index)) return;
            shownIndices.add(index);

            const wish = wishesArr[index];
            const bubble = document.createElement('div');
            bubble.className = 'floating-bubble';
            bubble.innerHTML = `<strong>${wish.name}:</strong> ${wish.message}`;
            
            // Xử lý Làn đường (Lane) để không che nhau
            // Chia màn hình làm 3 làn (Trái - Giữa - Phải)
            let lane;
            do {
                lane = Math.floor(Math.random() * 3); 
            } while (lane === lastLane); // Không dùng lại làn cũ của tin vừa hiện
            lastLane = lane;

            const positions = [5, 35, 65]; // % left tương ứng 3 làn
            bubble.style.left = (positions[lane] + (Math.random() * 5)) + "%"; 
            
            document.getElementById('wish-overlay').appendChild(bubble);
            bubble.addEventListener('animationend', () => bubble.remove());
        }

        window.addEventListener('scroll', () => {
            const currentScroll = window.scrollY;
            const scrollStep = 250; 

            if (wishesArr.length > 0) {
                let wishIndex = Math.floor(currentScroll / scrollStep);
                // Đảm bảo lấy tin nhắn theo vòng lặp nếu cuộn quá nhiều
                let actualIndex = wishIndex % wishesArr.length; 
                
                if (!shownIndices.has(actualIndex)) {
                    spawnWishBubble(actualIndex);
                }
            }
        });

        // Countdown Logic & Send (Giữ nguyên)
        function updateCountdown() {
            const target = new Date("April 26, 2026 10:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) return;
            document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(updateCountdown, 1000);

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 150, origin: { y: 0.8 } });
                document.getElementById('name-in').value = '';
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
