<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tốt Nghiệp Yến Nhi - Gallery</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #c2185b; --pink-soft: #fce4ec; }
        
        body {
            margin: 0; font-family: 'Quicksand', sans-serif;
            background-color: var(--pink-soft);
            color: #333; overflow-x: hidden;
        }

        /* 1. Header Section (Phần đầu trang) */
        .section-intro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, #ffe0e9, var(--pink-soft));
        }

        .name { font-family: 'Dancing Script', cursive; font-size: 45px; color: var(--accent); margin: 10px 0; }
        .scroll-down { margin-top: 50px; font-size: 12px; color: #888; animation: bounce 2s infinite; }

        /* 2. Gallery Section (Kéo xuống để xem ảnh) */
        .gallery-container { padding: 20px; max-width: 600px; margin: 0 auto; }

        .photo-item {
            width: 100%;
            margin-bottom: 50px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .photo-item img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .photo-caption {
            margin-top: 15px;
            font-style: italic;
            text-align: center;
            color: #555;
        }

        /* 3. Lời chúc Section (Cuối trang) */
        .section-wishes {
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        #wish-list { margin-top: 20px; }
        .wish-box {
            background: var(--pink-soft);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--accent);
        }

        /* Form nhập lời chúc (Sticky) */
        .input-sticky {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: white; padding: 10px;
            border-radius: 30px; display: flex;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .input-sticky input { border: none; outline: none; padding: 10px; flex: 1; }
        .btn-heart { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <div class="section-intro">
        <div data-aos="zoom-in">🎓</div>
        <h1 data-aos="fade-up">Lễ Tốt Nghiệp</h1>
        <div class="name" data-aos="fade-up" data-aos-delay="300">Trần Đoàn Yến Nhi</div>
        <p data-aos="fade-up" data-aos-delay="500">26 Tháng 04, 2026</p>
        <div class="scroll-down">Kéo xuống để xem thêm ↓</div>
    </div>

    <div class="gallery-container">
        <div class="photo-item" data-aos="fade-right">
            <img src="anh1.jpg" alt="Kỷ niệm 1">
            <div class="photo-caption">Ngày đầu nhập học...</div>
        </div>

        <div class="photo-item" data-aos="fade-left">
            <img src="anh2.jpg" alt="Kỷ niệm 2">
            <div class="photo-caption">Những người bạn thân thiết</div>
        </div>

        <div class="photo-item" data-aos="fade-up">
            <img src="anh3.jpg" alt="Kỷ niệm 3">
            <div class="photo-caption">Khoảnh khắc rạng rỡ nhất</div>
        </div>
    </div>

    <div class="section-wishes">
        <h2 style="text-align: center; color: var(--accent);">Lời Chúc Ý Nghĩa</h2>
        <div id="wish-list"></div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên bạn.." style="width: 30%; border-right: 1px solid #eee;">
        <input type="text" id="msg-in" placeholder="Viết gì đó thật hay...">
        <button class="btn-heart" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        AOS.init({ duration: 1000 }); // Khởi tạo hiệu ứng cuộn

        // FIREBASE CONFIG (Nhớ dùng lại code config của bạn nhé)
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m });
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 } });
                document.getElementById('msg-in').value = '';
            }
        }

        db.ref('wishes').on('child_added', (s) => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'wish-box';
            div.innerHTML = `<strong>${d.name}:</strong> ${d.message}`;
            document.getElementById('wish-list').prepend(div);
        });
    </script>
</body>
</html>
