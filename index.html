<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --accent: #c2185b; 
            --pink-light: #fce4ec; 
            --pink-bg: #ffe0e9; 
            --white-glass: rgba(255, 255, 255, 0.92);
        }

        body { 
            margin: 0; 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--pink-light); 
            background-image: linear-gradient(135deg, #fffafa 0%, #fde2e4 100%);
            color: #333; 
            overflow-x: hidden; 
        }

        /* Music Toggle Button */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 10001;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .music-rotating { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 1. Intro Section */
        .section-intro { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light)); 
            padding: 20px; 
            box-sizing: border-box;
        }
        .name { font-family: 'Dancing Script', cursive; font-size: 50px; color: var(--accent); margin: 10px 0; }
        .hero-photo {
            width: 160px; height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: 15px 0;
        }

        /* Countdown */
        .countdown-container {
            display: flex; gap: 12px; margin-top: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 15px; border-radius: 25px;
        }
        .countdown-item { display: flex; flex-direction: column; min-width: 50px; }
        .countdown-time { font-size: 22px; font-weight: 700; color: var(--accent); }
        .countdown-label { font-size: 10px; text-transform: uppercase; color: #777; }

        /* 2. Gallery Layout */
        .gallery-container { padding: 80px 15px; max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 140px; }
        .photo-block { display: flex; flex-direction: column; width: 100%; position: relative; }
        .photo-frame { width: 85%; max-width: 400px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); }
        .photo-frame img { width: 100%; height: 480px; object-fit: cover; border-radius: 12px; }
        .meaning-box { width: 95%; background: var(--white-glass); padding: 25px; border-radius: 25px; margin-top: -60px; z-index: 2; border-left: 8px solid var(--accent); box-sizing: border-box; }
        .photo-block:nth-child(even) .photo-frame { align-self: flex-end; }
        .photo-block:nth-child(even) .meaning-box { align-self: flex-start; border-left: 0; border-right: 8px solid var(--accent); }
        .photo-block:nth-child(odd) .photo-frame { align-self: flex-start; }
        .photo-block:nth-child(odd) .meaning-box { align-self: flex-end; }
        .meaning-box h3 { margin: 0 0 12px 0; color: var(--accent); font-family: 'Dancing Script', cursive; font-size: 28px; }
        .meaning-box p { margin: 0; font-size: 15px; line-height: 1.8; color: #444; text-align: justify; }

        /* VÙNG TIN NHẮN TRÔI CỐ ĐỊNH (FIXED OVERLAY) */
        #wish-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 9999; 
            overflow: hidden;
        }
        
        #scroll-container {
            position: absolute;
            width: 250px;
            left: 20px;
            display: flex;
            flex-direction: column;
            animation: moveUp linear infinite;
        }

        .floating-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 13px;
            pointer-events: auto;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-100%); }
        }

        /* Input */
        .input-sticky { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: white; padding: 12px 18px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.25); z-index: 10000; }
        .input-sticky input { border: none; outline: none; flex: 1; font-size: 15px; }
        #name-in { width: 30%; border-right: 1px solid #eee; padding-right: 8px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <audio id="bg-music" loop>
            <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="wish-overlay">
        <div id="scroll-container"></div>
    </div>

    <div class="section-intro">
        <div data-aos="zoom-in" style="font-size: 60px;">✨</div>
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name" data-aos="fade-down">Trần Đoàn Yến Nhi</div>
        <img src="anh_hero.jpg" alt="Yến Nhi" class="hero-photo" data-aos="zoom-in">
        
        <div class="countdown-container" data-aos="fade-up">
            <div class="countdown-item"><div class="countdown-time" id="days">00</div><div class="countdown-label">Ngày</div></div>
            <div class="countdown-item"><div class="countdown-time" id="hours">00</div><div class="countdown-label">Giờ</div></div>
            <div class="countdown-item"><div class="countdown-time" id="minutes">00</div><div class="countdown-label">Phút</div></div>
            <div class="countdown-item"><div class="countdown-time" id="seconds">00</div><div class="countdown-label">Giây</div></div>
        </div>
    </div>

    <div class="gallery-container">
        <div class="photo-block" data-aos="fade-up">
            <div class="photo-frame"><img src="anh1.jpg"></div>
            <div class="meaning-box">
                <h3>Khúc dạo đầu của ước mơ</h3>
                <p>Mỗi hành trình vạn dặm đều bắt đầu từ một bước chân nhỏ bé. Nhi có nhớ ngày đầu tiên ấy không?...</p>
            </div>
        </div>
        </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc đến Nhi...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init({ duration: 1200, once: true });

        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Nhạc
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-control');
        const musicIcon = document.getElementById('music-icon');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.classList.add('music-rotating');
                musicIcon.innerText = '📻';
            } else {
                music.pause();
                musicBtn.classList.remove('music-rotating');
                musicIcon.innerText = '🎵';
            }
        }

        // Lấy Wishes và tạo hiệu ứng trôi
        db.ref('wishes').on('value', (snapshot) => {
            const container = document.getElementById('scroll-container');
            container.innerHTML = '';
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    const bubble = document.createElement('div');
                    bubble.className = 'floating-bubble';
                    bubble.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
                    container.appendChild(bubble);
                });
                // Chỉnh tốc độ trôi dựa trên số tin nhắn
                const duration = 10 + (snapshot.numChildren() * 2);
                container.style.animationDuration = `${duration}s`;
            }
        });

        // Countdown Logic
        function updateCountdown() {
            const target = new Date("April 26, 2026 10:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) return;
            document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(updateCountdown, 1000);

        // Gửi Wish
        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 150, origin: { y: 0.8 } });
                document.getElementById('name-in').value = '';
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
