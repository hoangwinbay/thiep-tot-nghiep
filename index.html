<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --accent: #c2185b; --pink-light: #fce4ec; --pink-bg: #ffe0e9; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Quicksand', sans-serif; 
            background: var(--pink-light); 
            /* Cho phép cuộn trang để xem ảnh */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* 1. Intro & Content (Nội dung trang web bình thường) */
        .section-intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .gallery { padding: 50px 20px; }
        .photo-card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .photo-card img { width: 100%; border-radius: 10px; }

        /* 2. PHẦN TIN NHẮN TRÔI CỐ ĐỊNH (FIXED OVERLAY) */
        .fixed-wish-container {
            position: fixed; /* Cố định trên màn hình */
            top: 20%;        /* Cách đỉnh màn hình 20% */
            right: 10px;     /* Nằm bên phải */
            width: 180px;    /* Độ rộng của vùng tin nhắn */
            height: 300px;   /* Chiều cao vùng hiển thị */
            z-index: 999;    /* Nằm trên tất cả các thành phần khác */
            pointer-events: none; /* Cho phép vuốt xuyên qua vùng này để cuộn trang */
            overflow: hidden;
        }

        #scroll-container {
            display: flex;
            flex-direction: column;
            position: absolute;
            width: 100%;
            animation: scrollUp linear infinite;
        }

        .wish-bubble {
            background: rgba(255, 255, 255, 0.9); /* Màu trắng trong suốt */
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            color: #333;
            pointer-events: auto; /* Vẫn cho phép nhấn vào tin nhắn nếu cần */
        }

        @keyframes scrollUp {
            0% { transform: translateY(300px); } /* Bắt đầu từ dưới đáy khung nhìn */
            100% { transform: translateY(-100%); } /* Trôi lên hết danh sách */
        }

        /* 3. Input Bar */
        .input-sticky { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: white; padding: 10px 15px; border-radius: 50px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        .input-sticky input { border: none; outline: none; flex: 1; font-size: 14px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section-intro">
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div style="font-family: 'Dancing Script'; font-size: 40px; color: var(--accent);">Yến Nhi</div>
        <p>Vuốt xuống để xem ảnh nhé ↓</p>
    </div>

    <div class="gallery">
        <div class="photo-card" data-aos="fade-up">
            <img src="anh1.jpg" alt="Kỷ niệm 1">
            <p>Khoảnh khắc rạng rỡ của Nhi.</p>
        </div>
        <div class="photo-card" data-aos="fade-up">
            <img src="anh2.jpg" alt="Kỷ niệm 2">
            <p>Hành trình nỗ lực không ngừng.</p>
        </div>
    </div>

    <div class="fixed-wish-container">
        <div id="scroll-container">
            </div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên" style="width: 50px; border-right: 1px solid #eee; margin-right: 5px;">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init();
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('wishes').on('value', (snapshot) => {
            const container = document.getElementById('scroll-container');
            let content = '';
            
            snapshot.forEach((child) => {
                const data = child.val();
                content += `
                    <div class="wish-bubble">
                        <strong>${data.name}</strong>: ${data.message}
                    </div>
                `;
            });

            // Nhân đôi nội dung để trôi vô tận
            container.innerHTML = content + content;
            
            // Chỉnh tốc độ trôi dựa trên số lượng tin nhắn
            const count = snapshot.numChildren();
            container.style.animationDuration = `${count * 4 + 5}s`;
        });

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 80, spread: 50, origin: { y: 0.9 } });
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
