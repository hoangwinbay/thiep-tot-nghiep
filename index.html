<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #c2185b;
            --pink-light: #fce4ec;
            --pink-bg: #ffe0e9;
        }

        body { margin: 0; font-family: 'Quicksand', sans-serif; background-color: var(--pink-light); color: #333; overflow-x: hidden; }

        /* Sections */
        .section-intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light)); padding: 20px; box-sizing: border-box; }
        .name { font-family: 'Dancing Script', cursive; font-size: 45px; color: var(--accent); margin: 15px 0; }
        .gallery-container { padding: 40px 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; }
        .photo-item { width: 100%; margin-bottom: 80px; background: white; padding: 15px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; }
        .photo-item img { width: 100%; border-radius: 18px; display: block; }
        .photo-caption { margin-top: 20px; font-size: 14px; line-height: 1.7; text-align: justify; }

        /* KHUNG TIN NHẮN TRÔI THEO MÀN HÌNH (FIXED) */
        #fixed-wish-container {
            position: fixed;
            bottom: 100px; /* Nằm trên thanh nhập tin nhắn */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 380px;
            z-index: 999;
            pointer-events: none; /* Để không vướng khi chạm màn hình */
        }

        .single-wish {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(194, 24, 91, 0.2);
            border-left: 6px solid var(--accent);
            font-size: 14px;
            
            /* Hiệu ứng mặc định: Trôi lên và mờ dần */
            animation: slideUpFade 5s ease-in-out forwards;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(30px); opacity: 0; }
            20% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(-20px); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* Input bar */
        .input-sticky { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: white; padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 1001; }
        .input-sticky input { border: none; outline: none; padding: 10px; flex: 1; font-size: 15px; }
        #name-in { width: 30%; border-right: 1px solid #eee; }
        .btn-send { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section-intro">
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <div style="margin-top:20px; color:#888;">Vuốt xuống để xem và đọc lời chúc ↓</div>
    </div>

    <div id="fixed-wish-container"></div>

    <div class="gallery-container">
        <div class="photo-item" data-aos="fade-up">
            <img src="anh1.jpg" alt="1">
            <div class="photo-caption"><strong>Kỷ niệm 1</strong><br>Hành trình bắt đầu...</div>
        </div>
        <div class="photo-item" data-aos="fade-up">
            <img src="anh2.jpg" alt="2">
            <div class="photo-caption"><strong>Kỷ niệm 2</strong><br>Nỗ lực không ngừng...</div>
        </div>
        <div class="photo-item" data-aos="fade-up">
            <img src="anh3.jpg" alt="3">
            <div class="photo-caption"><strong>Kỷ niệm 3</strong><br>Tình bạn rực rỡ...</div>
        </div>
        <div class="photo-item" data-aos="fade-up">
            <img src="anh4.jpg" alt="4">
            <div class="photo-caption"><strong>Kỷ niệm 4</strong><br>Gia đình yêu thương...</div>
        </div>
        <div class="photo-item" data-aos="fade-up">
            <img src="anh5.jpg" alt="5">
            <div class="photo-caption"><strong>Kỷ niệm 5</strong><br>Niềm vui vỡ òa...</div>
        </div>
        <div class="photo-item" data-aos="fade-up">
            <img src="anh6.jpg" alt="6">
            <div class="photo-caption"><strong>Kỷ niệm 6</strong><br>Tương lai rộng mở...</div>
        </div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init();
        
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let wishes = [];
        let currentIndex = 0;
        let lastScrollY = window.scrollY;

        // Tải dữ liệu từ Firebase
        db.ref('wishes').on('value', (snapshot) => {
            wishes = [];
            snapshot.forEach((child) => {
                wishes.push(child.val());
            });
        });

        // Hàm hiển thị tin nhắn
        function showNextWish() {
            if (wishes.length === 0) return;
            
            const container = document.getElementById('fixed-wish-container');
            // Xóa tin nhắn cũ nếu có
            container.innerHTML = '';

            const wish = wishes[currentIndex % wishes.length];
            const wishEl = document.createElement('div');
            wishEl.className = 'single-wish';
            wishEl.innerHTML = `<strong>${wish.name}:</strong> ${wish.message}`;
            
            container.appendChild(wishEl);
            currentIndex++;
        }

        // Lắng nghe sự kiện vuốt màn hình (Scroll)
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            
            // Nếu người dùng cuộn một khoảng đủ xa (ví dụ 300px)
            if (Math.abs(currentScrollY - lastScrollY) > 300) {
                lastScrollY = currentScrollY;
                
                // Debounce để không hiện quá nhiều tin nhắn cùng lúc
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    showNextWish();
                }, 100);
            }
        });

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m });
                confetti({ particleCount: 100, origin: { y: 0.9 } });
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
