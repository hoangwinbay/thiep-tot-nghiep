<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Yến Nhi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --accent: #c2185b; --pink-bg: #ffe0e9; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Quicksand', sans-serif; 
            background: #fffafa;
            overflow-x: hidden;
            min-height: 200vh; /* Tạo chiều cao để có thể vuốt màn hình */
        }

        /* 1. NỘI DUNG CHÍNH (ẢNH, CHỮ...) */
        .content-wrapper {
            padding: 20px;
            text-align: center;
        }
        .placeholder-photo {
            width: 100%; max-width: 400px; height: 500px;
            background: #eee; border-radius: 20px;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
        }

        /* 2. VÙNG TIN NHẮN TRÔI - CỐ ĐỊNH 100% */
        .wish-overlay {
            position: fixed; /* Cố định trên màn hình */
            top: 0; left: 0;
            width: 100%; height: 100%; /* Phủ toàn màn hình */
            pointer-events: none; /* QUAN TRỌNG: Vuốt xuyên qua lớp này để cuộn trang */
            z-index: 9999; /* Luôn nằm trên cùng */
            overflow: hidden;
        }

        #scroll-container {
            position: absolute;
            bottom: -100px; /* Bắt đầu từ dưới cùng */
            left: 20px; /* Căn lề trái hoặc phải tùy bạn */
            width: 250px;
            display: flex;
            flex-direction: column;
            animation: moveUp linear infinite; /* Gọi hiệu ứng trôi */
        }

        .wish-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 14px;
            pointer-events: auto; /* Để có thể nhấn vào tin nhắn nếu muốn */
        }

        /* HIỆU ỨNG TRÔI TỪ DƯỚI LÊN TRÊN HẾT MÀN HÌNH */
        @keyframes moveUp {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-120%); } 
        }

        /* 3. THANH NHẬP LIỆU */
        .input-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white;
            padding: 10px 15px; border-radius: 50px;
            display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10000;
        }
        input { border: none; outline: none; flex: 1; padding: 5px; }
        .btn { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1 style="color: var(--accent);">Chúc Mừng Yến Nhi</h1>
        <p>Thử vuốt màn hình lên xuống nhé, tin nhắn vẫn trôi!</p>
        <div class="placeholder-photo">Ảnh tốt nghiệp 1</div>
        <div class="placeholder-photo">Ảnh tốt nghiệp 2</div>
        <div class="placeholder-photo">Ảnh tốt nghiệp 3</div>
    </div>

    <div class="wish-overlay">
        <div id="scroll-container">
            </div>
    </div>

    <div class="input-bar">
        <input type="text" id="n" placeholder="Tên" style="width: 50px;">
        <input type="text" id="m" placeholder="Lời chúc...">
        <button class="btn" onclick="send()">❤</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lấy dữ liệu
        db.ref('wishes').on('value', (snapshot) => {
            const container = document.getElementById('scroll-container');
            container.innerHTML = '';
            
            snapshot.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = 'wish-bubble';
                div.innerHTML = `<strong>${data.name}</strong>: ${data.message}`;
                container.appendChild(div);
            });

            // Điều chỉnh tốc độ trôi dựa trên số lượng tin nhắn (ví dụ: 10 giây + 2s mỗi tin nhắn)
            const duration = 10 + (snapshot.numChildren() * 2);
            container.style.animationDuration = `${duration}s`;
        });

        function send() {
            const name = document.getElementById('n').value;
            const msg = document.getElementById('m').value;
            if(name && msg) {
                db.ref('wishes').push({ name: name, message: msg });
                confetti({ particleCount: 100, origin: { y: 0.8 } });
                document.getElementById('m').value = '';
            }
        }
    </script>
</body>
</html>
