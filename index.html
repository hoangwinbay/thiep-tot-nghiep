<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #c2185b;
            --pink-light: #fce4ec;
            --pink-bg: #ffe0e9;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--pink-light);
            color: #333;
            overflow-x: hidden;
        }

        /* 1. Intro Section */
        .section-intro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light));
            padding: 20px;
            box-sizing: border-box;
        }

        .cap-icon { font-size: 50px; margin-bottom: 10px; }
        .name { font-family: 'Dancing Script', cursive; font-size: 42px; color: var(--accent); margin: 10px 0; }

        /* 2. Gallery Section */
        .gallery-container { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        .photo-item {
            width: 100%; margin-bottom: 60px; background: white; padding: 12px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .photo-item img { width: 100%; border-radius: 15px; }
        .photo-caption { margin-top: 20px; font-size: 14px; line-height: 1.7; text-align: justify; color: #444; }
        .photo-caption strong { display: block; font-size: 18px; color: var(--accent); margin-bottom: 10px; text-align: center; }

        /* 3. HIỆU ỨNG TIN NHẮN TRÔI LÊN (FLYING WISHES) */
        .section-wishes {
            height: 80vh;
            position: relative;
            background: white;
            border-radius: 30px 30px 0 0;
            overflow: hidden; /* Cắt phần tin nhắn trôi ra ngoài */
            padding-top: 20px;
        }

        .wish-title { text-align: center; font-family: 'Dancing Script', cursive; font-size: 32px; color: var(--accent); z-index: 10; position: relative; }

        /* Vùng chứa các tin nhắn đang bay */
        #wish-stream {
            position: absolute;
            bottom: -100px;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .flying-wish {
            position: absolute;
            width: 80%;
            left: 10%;
            background: var(--pink-light);
            padding: 12px 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 13px;
            border-left: 4px solid var(--accent);
            animation: floatUp 15s linear forwards; /* Điều chỉnh tốc độ trôi ở đây (15s) */
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        /* 4. Sticky Input Bar */
        .input-sticky {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white; padding: 8px 12px;
            border-radius: 40px; display: flex; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; box-sizing: border-box;
        }
        .input-sticky input { border: none; outline: none; padding: 10px; font-size: 14px; }
        #name-in { width: 30%; border-right: 1px solid #eee; }
        #msg-in { flex-grow: 1; padding-left: 15px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div class="section-intro">
        <div class="cap-icon" data-aos="zoom-in">🎓</div>
        <h1>Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <div class="scroll-hint">Kéo xuống xem hành trình và gửi lời chúc ↓</div>
    </div>

    <div class="gallery-container">
        <div class="photo-item" data-aos="fade-up">
            <img src="anh1.jpg" alt="1">
            <div class="photo-caption"><strong>Hành trình vạn dặm...</strong>...thông điệp 1...</div>
        </div>
        </div>

    <div class="section-wishes">
        <div class="wish-title">Dòng Lưu Bút</div>
        <div id="wish-stream">
            </div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 } });
                document.getElementById('msg-in').value = '';
            }
        }

        // HÀM TẠO TIN NHẮN BAY
        function createFlyingWish(name, message) {
            const container = document.getElementById('wish-stream');
            const wishEl = document.createElement('div');
            wishEl.className = 'flying-wish';
            wishEl.innerHTML = `<strong>${name}:</strong> ${message}`;
            
            // Random vị trí bắt đầu theo chiều dọc một chút để không bị đè nhau hoàn toàn
            const randomDelay = Math.random() * 5; 
            wishEl.style.animationDelay = `${randomDelay}s`;
            
            container.appendChild(wishEl);

            // Xóa phần tử sau khi bay xong để nhẹ trình duyệt
            wishEl.addEventListener('animationend', () => {
                wishEl.remove();
                // Sau khi mất, tạo lại để nó lặp lại (vòng lặp vô tận)
                createFlyingWish(name, message);
            });
        }

        // Khi có tin nhắn mới từ Firebase
        db.ref('wishes').on('child_added', (snapshot) => {
            const d = snapshot.val();
            createFlyingWish(d.name, d.message);
        });
    </script>
</body>
</html>
