<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #c2185b;
            --pink-light: #fce4ec;
            --pink-bg: #ffe0e9;
        }

        body {
            margin: 0; padding: 0; width: 100%; font-family: 'Quicksand', sans-serif;
            background-color: var(--pink-light);
            background-image: linear-gradient(135deg, #fffafa 0%, #fde2e4 100%);
            color: #333; overflow-x: hidden;
        }

        /* 1. Intro Section */
        .section-intro {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light));
        }
        .name { font-family: 'Dancing Script', cursive; font-size: clamp(45px, 10vw, 60px); color: var(--accent); margin: 15px 0; }

        /* 2. Gallery Layout */
        .gallery-container { padding: 50px 15px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 100px; }
        .photo-frame { width: 85%; max-width: 350px; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .photo-frame img { width: 100%; border-radius: 12px; }
        .meaning-box { width: 95%; background: white; padding: 20px; border-radius: 20px; margin-top: -40px; border-left: 6px solid var(--accent); }

        /* PHẦN LƯU BÚT TRÔI CHẬM (SCROLLING WISHES) */
        .section-wishes {
            background: white; padding: 40px 20px 150px 20px;
            border-radius: 50px 50px 0 0; margin-top: 50px;
            text-align: center;
        }
        .wish-list-title { font-family: 'Dancing Script', cursive; font-size: 40px; color: var(--accent); margin-bottom: 20px; }

        /* Khung chứa hiệu ứng cuộn */
        .wish-display-area {
            max-width: 500px; height: 400px; margin: 0 auto;
            overflow: hidden; position: relative;
            background: #fff5f7; border-radius: 25px;
            border: 1px solid #fce4ec;
        }

        /* Container chứa các tin nhắn đang chạy */
        #scroll-container {
            position: absolute; width: 100%;
            animation: scrollUp 20s linear infinite; /* Điều chỉnh số giây để nhanh/chậm */
        }

        /* Dừng lại khi di chuột vào để dễ đọc */
        .wish-display-area:hover #scroll-container { animation-play-state: paused; }

        .wish-card {
            background: white; margin: 15px auto; padding: 15px;
            width: 85%; border-radius: 15px; border-bottom: 3px solid var(--pink-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-align: left;
        }

        @keyframes scrollUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }

        /* 4. Input Bar */
        .input-sticky {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: white; padding: 10px 20px;
            border-radius: 50px; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;
        }
        .input-sticky input { border: none; outline: none; flex: 1; padding: 5px; }
        .btn-send { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section-intro">
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <p>Hành trình của những giấc mơ</p>
    </div>

    <div class="gallery-container">
        <div class="meaning-box" data-aos="zoom-in" style="margin-top: 0; text-align: center; border-left: none; border: 2px dashed var(--accent);">
            <h3 style="font-family: 'Dancing Script'; font-size: 30px; color: var(--accent);">Hẹn Nhi vào lúc</h3>
            <p><strong>10:00 - Ngày 26/04/2026</strong></p>
            <p>Trường THPT Nguyễn Trường Thúy</p>
        </div>
    </div>

    <div class="section-wishes">
        <div class="wish-list-title">Lời chúc trôi lên...</div>
        
        <div class="wish-display-area">
            <div id="scroll-container">
                </div>
        </div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên.." style="width: 60px; border-right: 1px solid #eee;">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc đến Nhi..." style="padding-left: 10px;">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init();
        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lấy dữ liệu và tạo nội dung cuộn
        db.ref('wishes').on('value', (snapshot) => {
            const container = document.getElementById('scroll-container');
            container.innerHTML = '';
            
            let allWishesHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                allWishesHTML += `
                    <div class="wish-card">
                        <strong>${data.name}</strong>: ${data.message}
                    </div>
                `;
            });

            // Để hiệu ứng cuộn mượt mà và không bị hở, ta nhân đôi nội dung
            container.innerHTML = allWishesHTML + allWishesHTML;
            
            // Điều chỉnh tốc độ dựa trên số lượng tin nhắn (càng nhiều tin nhắn chạy càng lâu)
            const count = snapshot.numChildren();
            const duration = Math.max(10, count * 3); // Tối thiểu 10 giây
            container.style.animationDuration = `${duration}s`;
        });

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
