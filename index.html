<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Trần Đoàn Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --accent: #c2185b; 
            --pink-light: #fce4ec; 
            --pink-bg: #ffe0e9; 
            --white-glass: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--pink-light); 
            background-image: linear-gradient(135deg, #fffafa 0%, #fde2e4 100%);
            color: #333; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Music Button */
        #music-btn {
            position: fixed; top: 15px; right: 15px;
            width: 40px; height: 40px; background: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 10002;
            cursor: pointer; font-size: 18px;
        }
        .rotating { animation: rotateMusic 4s linear infinite; }
        @keyframes rotateMusic { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Intro */
        .section-intro { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .name { font-family: 'Dancing Script', cursive; font-size: clamp(35px, 10vw, 55px); color: var(--accent); margin: 10px 0; }
        .hero-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin: 15px 0; }

        /* Countdown */
        .countdown-container { display: flex; gap: 10px; margin-top: 15px; background: rgba(255, 255, 255, 0.6); padding: 10px 15px; border-radius: 20px; }
        .countdown-time { font-size: 20px; font-weight: 700; color: var(--accent); }
        .countdown-label { font-size: 9px; text-transform: uppercase; color: #666; }

        /* Floating Messages - Optimized for Mobile */
        #wish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .floating-bubble {
            position: absolute;
            width: 70%; max-width: 260px; /* Thu nhỏ chiều rộng trên mobile */
            background: var(--white-glass);
            padding: 12px 15px; border-radius: 15px; 
            border-left: 4px solid var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12); 
            font-size: 13px;
            animation: flowUpOnce 14s linear forwards; 
            opacity: 0;
            word-wrap: break-word;
        }
        @keyframes flowUpOnce { 
            0% { bottom: -120px; opacity: 0; transform: scale(0.9); } 
            10% { opacity: 1; transform: scale(1); } 
            90% { opacity: 1; } 
            100% { bottom: 105vh; opacity: 0; } 
        }

        /* Gallery */
        .gallery-container { padding: 50px 15px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 100px; }
        .photo-block { display: flex; flex-direction: column; width: 100%; position: relative; }
        .photo-frame { width: 90%; max-width: 350px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .photo-frame img { width: 100%; height: auto; max-height: 400px; object-fit: cover; border-radius: 10px; }
        .meaning-box { width: 95%; background: var(--white-glass); padding: 20px; border-radius: 20px; margin-top: -40px; z-index: 2; border-right: 6px solid var(--accent); box-sizing: border-box; }

        /* Input Bar - Fixed for Mobile */
        .input-sticky { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 450px; background: white; 
            padding: 8px 12px; border-radius: 40px; 
            display: flex; align-items: center; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15), 0 10px 30px rgba(0,0,0,0.2); 
            z-index: 10001; /* Đảm bảo luôn nằm trên overlay tin nhắn */
        }
        .input-sticky input { border: none; outline: none; padding: 8px; font-size: 14px; background: transparent; }
        #name-in { width: 70px; border-right: 1px solid #eee; }
        #msg-in { flex: 1; min-width: 0; }
        .btn-send { 
            background: var(--accent); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        /* Static Wish List */
        .section-wishes { background: white; padding: 40px 20px 150px 20px; border-radius: 40px 40px 0 0; }
        .wish-card { background: var(--pink-light); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); font-size: 14px; }

        @media (max-width: 600px) {
            .gallery-container { gap: 80px; }
            .floating-bubble { width: 65%; font-size: 12px; }
            .input-sticky { bottom: 15px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <div id="music-btn" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <audio id="bg-audio" loop>
            <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="wish-overlay"></div>

    <div class="section-intro">
        <div data-aos="zoom-in" style="font-size: 50px;">✨</div>
        <h1 data-aos="fade-down" style="margin:0; font-size: 1.5rem;">Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <img src="anh_hero.jpg" class="hero-photo" data-aos="zoom-in">
        <div class="countdown-container">
            <div class="countdown-item"><div class="countdown-time" id="days">00</div><div class="countdown-label">Ngày</div></div>
            <div class="countdown-item"><div class="countdown-time" id="hours">00</div><div class="countdown-label">Giờ</div></div>
            <div class="countdown-item"><div class="countdown-time" id="minutes">00</div><div class="countdown-label">Phút</div></div>
            <div class="countdown-item"><div class="countdown-time" id="seconds">00</div><div class="countdown-label">Giây</div></div>
        </div>
    </div>

    <div class="gallery-container">
        <div class="photo-block" data-aos="fade-up">
            <div class="photo-frame"><img src="anh1.jpg"></div>
            <div class="meaning-box">
                <h3 style="margin:0; color:var(--accent); font-family:'Dancing Script';">Hành trình bắt đầu</h3>
                <p style="font-size:14px; margin-top:10px;">Mỗi bước chân hôm nay là kết quả của sự nỗ lực không ngừng nghỉ suốt những năm tháng qua...</p>
            </div>
        </div>
    </div>

    <div class="section-wishes">
        <h2 style="text-align:center; font-family:'Dancing Script'; color:var(--accent); font-size:35px;">Lưu Bút</h2>
        <div id="static-wish-list"></div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            databaseURL: "https://thieptotnghiep-1e79e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Music
        const audio = document.getElementById('bg-audio');
        const mBtn = document.getElementById('music-btn');
        function toggleMusic() {
            if (audio.paused) { audio.play(); mBtn.classList.add('rotating'); }
            else { audio.pause(); mBtn.classList.remove('rotating'); }
        }

        // Logic trôi tin nhắn
        let wishesArr = [];
        let shownIndices = new Set();
        let lastLane = -1;

        db.ref('wishes').on('value', (snapshot) => {
            const listContainer = document.getElementById('static-wish-list');
            listContainer.innerHTML = ''; 
            wishesArr = [];
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    wishesArr.push(data);
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
                    listContainer.prepend(card); 
                });
            }
        });

        function spawnWishBubble(index) {
            if (shownIndices.has(index)) return;
            shownIndices.add(index);

            const wish = wishesArr[index];
            const bubble = document.createElement('div');
            bubble.className = 'floating-bubble';
            bubble.innerHTML = `<strong>${wish.name}:</strong> ${wish.message}`;
            
            // Chia làn đường (2 làn cho Mobile, 3 làn cho Desktop)
            const isMobile = window.innerWidth < 600;
            const laneCount = isMobile ? 2 : 3;
            
            let lane;
            do { lane = Math.floor(Math.random() * laneCount); } while (lane === lastLane);
            lastLane = lane;

            const positions = isMobile ? [5, 30] : [5, 35, 65];
            bubble.style.left = positions[lane] + "%"; 
            
            document.getElementById('wish-overlay').appendChild(bubble);
            bubble.addEventListener('animationend', () => bubble.remove());
        }

        window.addEventListener('scroll', () => {
            const currentScroll = window.scrollY;
            const scrollStep = 250; 
            if (wishesArr.length > 0) {
                let actualIndex = Math.floor(currentScroll / scrollStep) % wishesArr.length;
                if (!shownIndices.has(actualIndex)) spawnWishBubble(actualIndex);
            }
        });

        // Countdown
        setInterval(() => {
            const diff = new Date("April 26, 2026 10:00:00").getTime() - new Date().getTime();
            if (diff < 0) return;
            document.getElementById("days").innerText = Math.floor(diff / 86400000);
            document.getElementById("hours").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("minutes").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("seconds").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 100, origin: { y: 0.8 } });
                document.getElementById('name-in').value = '';
                document.getElementById('msg-in').value = '';
                // Ẩn bàn phím sau khi gửi trên mobile
                document.activeElement.blur();
            }
        }
    </script>
</body>
</html>
