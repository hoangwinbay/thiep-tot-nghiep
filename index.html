<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Tốt Nghiệp - Yến Nhi</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --accent: #c2185b; --pink-light: #fce4ec; --pink-bg: #ffe0e9; }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background-color: var(--pink-light); color: #333; overflow-x: hidden; }

        .section-intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(to bottom, var(--pink-bg), var(--pink-light)); padding: 20px; box-sizing: border-box; }
        .name { font-family: 'Dancing Script', cursive; font-size: 45px; color: var(--accent); margin: 15px 0; }
        
        .gallery-container { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        .photo-item { width: 100%; margin-bottom: 60px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        .photo-item img { width: 100%; border-radius: 15px; display: block; }

        /* Vùng tin nhắn bay khi vuốt (Fixed) */
        #wish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .floating-bubble {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 20px; border-left: 6px solid var(--accent);
            box-shadow: 0 10px 25px rgba(194, 24, 91, 0.2); font-size: 14px;
            animation: flowUp 5s ease-out forwards;
        }
        @keyframes flowUp { 
            0% { bottom: -10%; opacity: 0; } 
            20% { opacity: 1; } 
            80% { opacity: 1; } 
            100% { bottom: 60%; opacity: 0; } 
        }

        /* Phần danh sách lời chúc vĩnh viễn */
        .section-wishes { background: white; padding: 40px 20px 150px 20px; border-radius: 30px 30px 0 0; min-height: 300px; }
        .wish-list-title { text-align: center; font-family: 'Dancing Script', cursive; font-size: 35px; color: var(--accent); margin-bottom: 30px; }
        #static-wish-list { display: flex; flex-direction: column; gap: 15px; }
        .wish-card { background: var(--pink-light); padding: 15px; border-radius: 15px; border-left: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* Input Bar */
        .input-sticky { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: white; padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10000; }
        .input-sticky input { border: none; outline: none; padding: 10px; flex: 1; font-size: 15px; }
        #name-in { width: 30%; border-right: 1px solid #eee; }
        .btn-send { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="section-intro">
        <div data-aos="zoom-in" style="font-size: 50px;">🎓</div>
        <h1 data-aos="fade-down">Lễ Tốt Nghiệp</h1>
        <div class="name">Trần Đoàn Yến Nhi</div>
        <p>Hành trình rực rỡ của Nhi</p>
    </div>

    <div id="wish-overlay"></div>

    <div class="gallery-container">
        <div class="photo-item" data-aos="fade-up"><img src="anh1.jpg"></div>
        <div class="photo-item" data-aos="fade-up"><img src="anh2.jpg"></div>
        <div class="photo-item" data-aos="fade-up"><img src="anh3.jpg"></div>
        <div class="photo-item" data-aos="fade-up"><img src="anh4.jpg"></div>
        <div class="photo-item" data-aos="fade-up"><img src="anh5.jpg"></div>
        <div class="photo-item" data-aos="fade-up"><img src="anh6.jpg"></div>
    </div>

    <div class="section-wishes">
        <div class="wish-list-title">Dòng Lưu Bút</div>
        <div id="static-wish-list">
            </div>
    </div>

    <div class="input-sticky">
        <input type="text" id="name-in" placeholder="Tên..">
        <input type="text" id="msg-in" placeholder="Gửi lời chúc...">
        <button class="btn-send" onclick="send()">❤</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script>
        AOS.init();

        const firebaseConfig = {
            apiKey: "AIzaSyB4PKGLjoQ_-TtjMZfJVXz8dD_6DBeJQeM",
            authDomain: "thieptotnghiep-1e79e.firebaseapp.com",
            projectId: "thieptotnghiep-1e79e",
            storageBucket: "thieptotnghiep-1e79e.firebasestorage.app",
            messagingSenderId: "6578169222",
            appId: "1:6578169222:web:23bb55a36b073d60eff807"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let wishesArr = [];
        let lastScrollY = window.scrollY;

        // 1. TẢI DỮ LIỆU KHI RESET TRANG (QUAN TRỌNG)
        db.ref('wishes').on('value', (snapshot) => {
            const listContainer = document.getElementById('static-wish-list');
            listContainer.innerHTML = ''; // Xóa trắng để load lại từ đầu
            wishesArr = [];
            
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                wishesArr.push(data);
                
                // Hiển thị vào danh sách vĩnh viễn ở dưới
                const card = document.createElement('div');
                card.className = 'wish-card';
                card.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
                listContainer.prepend(card); // Tin mới nhất lên trên
            });
        });

        // 2. HIỆU ỨNG BAY KHI VUỐT
        function spawnWish() {
            if (wishesArr.length === 0) return;
            const randomWish = wishesArr[Math.floor(Math.random() * wishesArr.length)];
            
            const overlay = document.getElementById('wish-overlay');
            const bubble = document.createElement('div');
            bubble.className = 'floating-bubble';
            bubble.innerHTML = `<strong>${randomWish.name}:</strong> ${randomWish.message}`;
            overlay.appendChild(bubble);
            
            bubble.addEventListener('animationend', () => bubble.remove());
        }

        window.addEventListener('scroll', () => {
            if (Math.abs(window.scrollY - lastScrollY) > 450) {
                spawnWish();
                lastScrollY = window.scrollY;
            }
        });

        // 3. GỬI TIN NHẮN
        function send() {
            const n = document.getElementById('name-in').value;
            const m = document.getElementById('msg-in').value;
            if(n && m) {
                db.ref('wishes').push({ name: n, message: m, timestamp: Date.now() });
                confetti({ particleCount: 150, origin: { y: 0.8 } });
                document.getElementById('msg-in').value = '';
            }
        }
    </script>
</body>
</html>
